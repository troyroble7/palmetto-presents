<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Sign In | Palmetto Presents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #faf9f7;
            color: #611D11;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .login-logo {
            height: 40px;
            margin-bottom: 32px;
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .login-card p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #323543;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0ddd8;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Be Vietnam Pro', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #F9593B;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #F9593B;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Be Vietnam Pro', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #e04a2e;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg.show { display: block; }
        .login-footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #999;
            line-height: 1.5;
        }
        .login-footer a {
            color: #F9593B;
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/plr-logo.png" alt="Palmetto LightReach" class="login-logo">
        <h1>Palmetto Presents</h1>
        <p>Enter your passphrase to access your EPC portal.</p>

        <div class="error-msg" id="errorMsg"></div>

        <form method="POST" action="/api/login">
            <input type="hidden" name="redirect" id="redirectField" value="/">
            <div class="form-group">
                <label for="passphrase">Passphrase</label>
                <input type="password" id="passphrase" name="passphrase" placeholder="Enter your passphrase" required autocomplete="off">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <p class="login-footer">
            Contact your LightReach relationship manager if you need access.
        </p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        if (redirect) {
            document.getElementById('redirectField').value = redirect;
        }
        const error = params.get('error');
        if (error) {
            const el = document.getElementById('errorMsg');
            el.textContent = error;
            el.classList.add('show');
        }
    </script>
</body>
</html>
